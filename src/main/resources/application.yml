git:
  mcp:
    transport:
      stdio-enabled: true
      sse-enabled: false
      sse-port: 8080
      request-timeout: PT30S
    security:
      allowed-repositories:
        - ${user.home}/.git
      rate-limiting-enabled: true
      max-requests-per-minute: 60
      max-concurrent-operations: 10
    repository:
      default-branch: main
      auto-fetch: false
      operation-timeout-seconds: 30
      max-file-size: 10MB
    headless:
      daemon-mode: false
      structured-logging: false
      shutdown-timeout-seconds: 10
      batch-processing: false
    observability:
      tracing-enabled: true
      metrics-enabled: true
      log-level: INFO

# Requirement 15.5: Support profile-specific configuration
---
spring:
  config:
    activate:
      on-profile: dev
git:
  mcp:
    security:
      rate-limiting-enabled: false
    headless:
      structured-logging: true

---
spring:
  config:
    activate:
      on-profile: prod
git:
  mcp:
    headless:
      daemon-mode: true
      structured-logging: true
    security:
      max-requests-per-minute: 30
