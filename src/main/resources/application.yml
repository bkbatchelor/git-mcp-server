# Spring Boot Configuration
spring:
  main:
    web-application-type: none  # Disable web server to avoid port conflicts
    banner-mode: off           # Disable Spring Boot banner
  output:
    ansi:
      enabled: never           # Disable ANSI colors for cleaner logs

# Git MCP Server Configuration
git-mcp-server:
  repository:
    cache:
      max-size: 10
      timeout: 30m
  history:
    max-limit: 1000
  authentication:
    enabled: true
  mcp:
    server-name: "Git MCP Server"
    server-version: "1.0.0"

# MCP Debug System Configuration
mcp-debug:
  enabled: false  # Set to true to enable debug system
  global-level: INFO
  
  protocol-tracing:
    enabled: true
    retention: 24h
    buffer-size: 10000
    real-time-monitoring: false
    
  performance-monitoring:
    enabled: true
    collection-interval: 1s
    thresholds:
      tool-response-time: "5s"
      resource-response-size: "10MB"
      
  health-checks:
    enabled: true
    interval: 5m
    timeout: 30s
    
  storage:
    type: file # file, memory
    base-path: debug-data
    retention: 7d
    compression: true
    
  notifications:
    enabled: true
        
  export:
    sanitize-sensitive-data: true
    max-export-size: "100MB"

# Logging Configuration
logging:
  level:
    root: WARN                              # Reduce root logging level
    "[io.sandboxdev.gitmcp]": INFO          # Application logs
    "[org.eclipse.jgit]": WARN              # JGit logs
    "[org.springframework]": WARN           # Spring logs
    "[org.springframework.boot]": ERROR     # Spring Boot startup logs
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/git-mcp-server.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 5
      total-size-cap: 50MB
  # Disable console logging completely
  console:
    enabled: false
