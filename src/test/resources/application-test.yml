spring:
  ai:
    openai:
      api-key: test-key
    anthropic:
      api-key: test-key

git:
  mcp:
    transport:
      stdio-enabled: true
      sse-enabled: false
      sse-port: 8080
      request-timeout: PT5S
    security:
      allowed-repositories:
        - /tmp/test-repos
      enable-input-sanitization: true
      max-concurrent-operations: 5
    repository:
      default-branch: main
      max-file-size: 1MB
    observability:
      tracing-enabled: false
      metrics-enabled: false
      log-level: DEBUG

logging:
  level:
    io.sandboxdev.gitmcp: DEBUG