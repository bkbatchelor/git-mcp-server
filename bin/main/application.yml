spring:
  application:
    name: git-mcp-server

  # Enable Virtual Threads
  threads:
    virtual:
      enabled: true

  # Security Configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          # JWT configuration will be added when implementing security
          issuer-uri: ${JWT_ISSUER_URI:}

# Git MCP Server Configuration
git:
  mcp:
    transport:
      stdio-enabled: true
      sse-enabled: false
      sse-port: 8080
      request-timeout: PT30S
    security:
      allowed-repositories:
        - ${user.home}/Projects
        - ${user.home}/workspace
        - /tmp/git-repos
      enable-input-sanitization: true
      max-concurrent-operations: 10
    repository:
      default-branch: main
      max-file-size: 10MB
    observability:
      tracing-enabled: true
      metrics-enabled: true
      log-level: INFO

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0
  metrics:
    export:
      prometheus:
        enabled: true

# Logging Configuration
logging:
  level:
    io.sandboxdev.gitmcp: INFO
    org.eclipse.jgit: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev

git:
  mcp:
    observability:
      log-level: DEBUG

logging:
  level:
    io.sandboxdev.gitmcp: DEBUG

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod

git:
  mcp:
    security:
      enable-input-sanitization: true
    observability:
      log-level: WARN

logging:
  level:
    root: WARN
    io.sandboxdev.gitmcp: INFO