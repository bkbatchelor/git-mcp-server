spring:
  application:
    name: git-mcp-server-test

# Test-specific configuration
logging:
  level:
    root: WARN
    io.sandboxdev.gitmcp: DEBUG
    org.springframework.boot: WARN

# Git MCP Server test configuration
git-mcp:
  security:
    allowed-paths:
      - "/tmp"
      - "${java.io.tmpdir}"
    confirmation-required-operations:
      - "delete"
      - "reset"
  
  mcp:
    protocol-version: "2024-11-05"
    server-info:
      name: "git-mcp-server-test"
      version: "test"
    
    transport:
      stdio:
        enabled: false
      sse:
        enabled: false